name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
        working-directory: card-platform
      - name: Install Supabase CLI
        run: npm install -g supabase
      - name: Start Supabase (background)
        run: |
          cd card-platform
          supabase start --no-telemetry &
          # wait for postgres socket (approximation)
          sleep 10
      - name: Run build
        run: npm run build
        working-directory: card-platform
      - name: Run tests
        run: npm test --silent
        working-directory: card-platform
