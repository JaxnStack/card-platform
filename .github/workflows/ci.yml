name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node setup
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install dependencies
        run: npm ci
        working-directory: card-platform

      # ✅ Correct Supabase CLI setup (replaces npm install -g supabase)
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Start Supabase locally
      - name: Start Supabase (background)
        run: |
          cd card-platform
          supabase start --no-telemetry &
          sleep 15

      # Build project
      - name: Run build
        run: npm run build
        working-directory: card-platform

      # Run tests
      - name: Run tests
        run: npm test --silent
        working-directory: card-platform